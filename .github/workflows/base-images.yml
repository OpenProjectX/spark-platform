name: Base Images

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Push images to GHCR"
        required: true
        default: true
        type: boolean
      repository:
        description: "Image repository"
        required: true
        default: "ghcr.io/openprojectx/spark"
        type: string

permissions:
  contents: read
  packages: write

jobs:
  base-images:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false
      IMAGE_REPOSITORY: ${{ github.event.inputs.repository || 'ghcr.io/openprojectx/spark' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Verify Docker environment
        run: |
          docker version
          docker info

      - name: Log in to GHCR
        if: ${{ inputs.publish }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build base images
        if: ${{ !inputs.publish }}
        run: |
          ./gradlew :spark-base-image:dockerBuildSparkBaseImages \
            -PsparkBaseImage.repository="${IMAGE_REPOSITORY}"

      - name: Publish base images
        if: ${{ inputs.publish }}
        run: |
          ./gradlew :spark-base-image:dockerPushSparkBaseImages \
            -PsparkBaseImage.repository="${IMAGE_REPOSITORY}"
